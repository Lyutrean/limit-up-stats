<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股涨跌停家数统计</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: #0f0f1a; color: #e0e0e0; }
.header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 24px 32px; border-bottom: 1px solid #2a2a4a; }
.header h1 { font-size: 26px; color: #ff6b35; display: flex; align-items: center; gap: 12px; }
.header h1 small { font-size: 14px; color: #888; font-weight: normal; }
.header .subtitle { color: #999; margin-top: 6px; font-size: 14px; }

.container { max-width: 1440px; margin: 0 auto; padding: 20px; }

/* Dashboard cards */
.dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
.card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 16px; text-align: center; }
.card .label { font-size: 12px; color: #888; margin-bottom: 4px; }
.card .value { font-size: 28px; font-weight: bold; color: #ff6b35; }
.card .value.red { color: #ff4757; }
.card .value.gold { color: #ffc312; }
.card .value.green { color: #2ed573; }
.card .value.blue { color: #70a1ff; }
.card .sub { font-size: 11px; color: #666; margin-top: 2px; }
.card .zt-badge { display: inline-block; background: rgba(255,71,87,0.2); color: #ff4757; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin: 2px; }
.card .dt-badge { display: inline-block; background: rgba(46,213,115,0.2); color: #2ed573; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin: 2px; }

/* Chart grid */
.chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.chart-grid .full { grid-column: 1 / -1; }
.chart-box { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 16px; }
.chart-box h3 { font-size: 15px; color: #ccc; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.chart-box h3 .badge { font-size: 11px; background: #2a2a4a; padding: 2px 8px; border-radius: 4px; color: #999; }
.chart-wrapper { position: relative; width: 100%; min-height: 300px; }
.chart-wrapper.tall { min-height: 400px; }

/* Trend range selector */
.range-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.range-btn { background: #2a2a4a; border: 1px solid #333; color: #888; padding: 4px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.range-btn:hover { color: #ccc; border-color: #ff6b35; }
.range-btn.active { background: #ff6b35; color: #fff; border-color: #ff6b35; }

/* Sector mood table */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th { background: #252545; color: #999; padding: 8px 10px; text-align: left; font-weight: 500; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1; }
.data-table td { padding: 6px 10px; border-bottom: 1px solid #222; }
.data-table tr:hover { background: #1e1e35; }
.data-table .zt-val { color: #ff4757; font-weight: bold; }
.data-table .dt-val { color: #2ed573; font-weight: bold; }
.sector-bar-bg { display: inline-block; height: 8px; border-radius: 4px; margin-right: 4px; vertical-align: middle; }
.sector-bar-zt { background: #ff4757; }
.sector-bar-dt { background: #2ed573; }

/* Concept tags */
.concept-tag { display: inline-block; background: #2a2a4a; color: #aaa; padding: 1px 6px; border-radius: 3px; font-size: 11px; margin: 1px; }

/* Tab */
.tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
.tab { padding: 8px 18px; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 8px 8px 0 0; cursor: pointer; color: #888; font-size: 13px; }
.tab.active { background: #2a2a4a; color: #ff6b35; border-bottom-color: #ff6b35; }
.tab:hover { color: #ccc; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Loading */
.loading { text-align: center; padding: 60px; color: #666; }
.loading .spinner { width: 40px; height: 40px; border: 3px solid #2a2a4a; border-top-color: #ff6b35; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #0f0f1a; }
::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #3a3a5a; }

/* Responsive */
@media (max-width: 768px) {
  .chart-grid { grid-template-columns: 1fr; }
  .header h1 { font-size: 20px; }
  .dashboard { grid-template-columns: repeat(2, 1fr); }
}

/* Info card */
.info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
.info-item { text-align: center; padding: 12px; background: #12122a; border-radius: 8px; }
.info-item .num { font-size: 22px; font-weight: bold; }
.info-item .lbl { font-size: 11px; color: #666; margin-top: 2px; }

/* Date label */
.date-label { font-size: 13px; color: #666; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="header">
  <h1>📊 A股涨跌停家数统计 <small id="todayLabel">加载中...</small></h1>
  <div class="subtitle">基于 Tushare Pro 多数据源 · 纯统计无个股 · 涨停家数/跌停家数/板块情绪</div>
</div>
<div class="container">

<div id="app">
  <div class="loading"><div class="spinner"></div>正在加载数据...</div>
</div>

</div>

<script>
// ============================================================
// Data
// ============================================================
let summary = null;

async function loadJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return await res.json();
}

async function loadAll() {
  try {
    summary = await loadJSON('data/summary.json');
    document.getElementById('todayLabel').textContent = summary.latest_date || '';
    renderApp();
  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="loading" style="color:#ff4757">❌ 数据加载失败: ${e.message}</div>`;
    throw e;
  }
}

// ============================================================
// Helpers
// ============================================================
const chartColors = ['#ff6b35','#ffc312','#7bed9f','#70a1ff','#ff4757','#5352ed','#2ed573','#ff6348','#eccc68','#a29bfe',
  '#fd79a8','#00cec9','#6c5ce7','#fdcb6e','#e17055','#00b894','#0984e3','#d63031','#636e72','#b2bec3'];

// ============================================================
// Render
// ============================================================
let trendRange = 60;
let allCharts = {};

function makeChart(id, config) {
  const canvas = document.getElementById(id);
  if (!canvas) return null;
  if (allCharts[id]) { allCharts[id].destroy(); delete allCharts[id]; }
  try {
    const ctx = canvas.getContext('2d');
    allCharts[id] = new Chart(ctx, config);
    return allCharts[id];
  } catch (e) { console.warn('Chart error:', id, e); return null; }
}

function renderApp() {
  const app = document.getElementById('app');
  if (!summary) {
    app.innerHTML = '<div class="loading" style="color:#ff4757">暂无数据</div>';
    return;
  }
  app.innerHTML = buildHTML();
  afterRender();
}

function buildHTML() {
  const s = summary;
  const td = s.today || {};

  const cards = `
    <div class="dashboard">
      <div class="card"><div class="label">🔥 今日涨停</div><div class="value red">${td.zt_count || 0}</div><div class="sub">只</div></div>
      <div class="card"><div class="label">💧 今日跌停</div><div class="value green">${td.dt_count || 0}</div><div class="sub">只</div></div>
      <div class="card"><div class="label">📈 最高连板</div><div class="value gold">${td.max_ban || 0}</div><div class="sub">板</div></div>
      <div class="card"><div class="label">🏭 涉及行业</div><div class="value blue">${s.total_industries}</div><div class="sub">个行业</div></div>
      <div class="card"><div class="label">📊 首板数</div><div class="value">${(td.ban_distribution||{})['1'] || 0}</div><div class="sub">首板</div></div>
      <div class="card"><div class="label">💎 高位板(4+)</div><div class="value gold">${((td.ban_distribution||{})['4']||0)+((td.ban_distribution||{})['5']||0)}</div><div class="sub">4板及以上</div></div>
      <div class="card"><div class="label">📚 数据天数</div><div class="value green">${s.total_days}</div><div class="sub">${s.total_records}条记录</div></div>
    </div>`;

  const tabs = `
    <div class="tabs">
      <div class="tab active" onclick="switchTab('overview',this)">📊 市场总览</div>
      <div class="tab" onclick="switchTab('mood',this)">🏭 板块情绪</div>
      <div class="tab" onclick="switchTab('echelon',this)">📈 连板梯队</div>
      <div class="tab" onclick="switchTab('concept',this)">🔗 概念热度</div>
    </div>`;

  const content = `
    <div id="tab-overview" class="tab-content active">${buildOverview()}</div>
    <div id="tab-mood" class="tab-content">${buildMood()}</div>
    <div id="tab-echelon" class="tab-content">${buildEchelon()}</div>
    <div id="tab-concept" class="tab-content">${buildConcept()}</div>`;

  return cards + tabs + content;
}

// ============================================================
// Tab: 市场总览
// ============================================================
function buildOverview() {
  const s = summary;
  const dt = s.daily_trend || [];

  // Range selector
  const ranges = [20, 60, 120, 0];
  const rangeLabels = ['20日', '60日', '120日', '全部'];
  const rangeBtns = ranges.map((r, i) =>
    `<button class="range-btn ${trendRange === r ? 'active' : ''}" onclick="setTrendRange(${r})">${rangeLabels[i]}</button>`
  ).join('');

  // Today quick info
  const td = s.today || {};
  const zt = td.zt_count || 0;
  const dtCount = td.dt_count || 0;

  return `
    <div class="chart-grid">
      <div class="chart-box full">
        <h3>📈 涨跌停家数趋势 <span class="badge">市场情绪风向标</span></h3>
        <div class="range-bar">${rangeBtns}</div>
        <div class="chart-wrapper tall"><canvas id="chart-trend"></canvas></div>
      </div>
    </div>
    <div class="chart-grid">
      <div class="chart-box">
        <h3>🔥 今日涨停连板分布</h3>
        <div class="chart-wrapper"><canvas id="chart-ban-dist"></canvas></div>
      </div>
      <div class="chart-box">
        <h3>🥧 涨停梯队占比</h3>
        <div class="chart-wrapper"><canvas id="chart-ban-pie"></canvas></div>
      </div>
    </div>
    <div class="chart-grid">
      <div class="chart-box full">
        <h3>🔗 概念热度 Top20 <span class="badge">已过滤非行业概念</span></h3>
        <div class="chart-wrapper"><canvas id="chart-concept-today"></canvas></div>
      </div>
    </div>`;
}

// ============================================================
// Tab: 板块情绪
// ============================================================
function buildMood() {
  const mood = summary.sector_mood || [];
  if (mood.length === 0) return '<div style="color:#666;padding:20px;text-align:center;">暂无数据</div>';

  const maxTotal = Math.max(...mood.map(m => m.total), 1);

  let rows = mood.map(m => {
    const pct = (m.total / maxTotal * 100).toFixed(0);
    const ztPct = m.zt > 0 ? (m.zt / m.total * 100).toFixed(0) : 0;
    const dtPct = m.dt > 0 ? (m.dt / m.total * 100).toFixed(0) : 0;
    return `<tr>
      <td>${m.name}</td>
      <td><span class="zt-val">${m.zt}</span></td>
      <td><span class="dt-val">${m.dt}</span></td>
      <td>${m.total}</td>
      <td>
        <div style="display:flex;align-items:center;gap:2px;">
          <span class="sector-bar-bg sector-bar-zt" style="width:${ztPct*2}px"></span>
          <span class="sector-bar-bg sector-bar-dt" style="width:${dtPct*2}px"></span>
        </div>
      </td>
    </tr>`;
  }).join('');

  return `
    <div class="chart-grid">
      <div class="chart-box full">
        <h3>🏭 板块情绪 — 今日各行业涨跌停家数</h3>
        <div style="max-height:600px;overflow-y:auto;">
          <table class="data-table">
            <thead><tr><th>行业板块</th><th>🔥 涨停</th><th>💧 跌停</th><th>合计</th><th>分布</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="chart-grid">
      <div class="chart-box full">
        <h3>📊 板块涨停排行 Top15</h3>
        <div class="chart-wrapper tall"><canvas id="chart-sector-bar"></canvas></div>
      </div>
    </div>`;
}

// ============================================================
// Tab: 连板梯队
// ============================================================
function buildEchelon() {
  const pr = summary.promotion_rates || {};
  const td = summary.today || {};
  const banDist = td.ban_distribution || {};

  // Promotion rate funnel
  const funnelSteps = [
    { label: '首板', count: banDist['1'] || 0, rate: '-' },
    { label: '二板', count: banDist['2'] || 0, rate: pr['1→2'] || 0 },
    { label: '三板', count: banDist['3'] || 0, rate: pr['2→3'] || 0 },
    { label: '四板', count: banDist['4'] || 0, rate: pr['3→4'] || 0 },
    { label: '五板+', count: ((banDist['5']||0)+(banDist['6']||0)+(banDist['7']||0)), rate: pr['4→5'] || 0 },
  ];

  const funnelHtml = funnelSteps.map((step, i) => {
    const rateStr = step.rate !== '-' ? step.rate + '%' : '-';
    const arrow = i < funnelSteps.length - 1 ? `<div style="color:#666;font-size:11px;margin:4px 0;">↓ ${rateStr}</div>` : '';
    return `<div style="text-align:center;padding:8px;">
      <div style="color:#999;font-size:12px;">${step.label}</div>
      <div style="font-size:22px;font-weight:bold;color:#ff6b35;">${step.count}</div>
      ${arrow}
    </div>`;
  }).join('');

  return `
    <div class="chart-grid">
      <div class="chart-box full"><h3>📈 连板梯队分布（今日）</h3><div class="chart-wrapper tall"><canvas id="chart-echelon-bar"></canvas></div></div>
    </div>
    <div class="chart-grid">
      <div class="chart-box full"><h3>🔄 晋级率漏斗</h3>
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:16px;background:#12122a;border-radius:8px;">
          ${funnelHtml}
        </div>
      </div>
    </div>
    <div class="chart-grid">
      <div class="chart-box full"><h3>📊 历史平均晋级率</h3><div class="chart-wrapper"><canvas id="chart-promo-rate"></canvas></div></div>
    </div>`;
}

// ============================================================
// Tab: 概念热度
// ============================================================
function buildConcept() {
  const concepts = summary.concept_ranking || [];
  if (concepts.length === 0) return '<div style="color:#666;padding:20px;text-align:center;">暂无数据（跌停日暂无概念热度）</div>';

  return `
    <div class="chart-grid">
      <div class="chart-box full"><h3>🔗 概念热度排行 Top20（已过滤非行业概念）</h3><div class="chart-wrapper tall"><canvas id="chart-concept-rank"></canvas></div></div>
    </div>
    <div class="chart-grid">
      <div class="chart-box full">
        <h3>📋 概念排名详情</h3>
        <div style="max-height:500px;overflow-y:auto;">
          <table class="data-table">
            <thead><tr><th>排名</th><th>概念</th><th>涨停股数</th></tr></thead>
            <tbody>
              ${concepts.map((c, i) => `<tr><td>${i+1}</td><td><span class="concept-tag">${c.name}</span></td><td class="zt-val">${c.count}</td></tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
}

// ============================================================
// After render - draw charts
// ============================================================
function afterRender() {
  drawTrendChart();
  drawBanDistChart();
  drawBanPieChart();
  drawConceptTodayChart();
  drawEchelonBar();
  drawPromoRate();
  drawConceptRank();
  drawSectorBar();
}

function getTrendData() {
  const dt = summary.daily_trend || [];
  if (trendRange === 0) return dt;
  return dt.slice(-trendRange);
}

function setTrendRange(days) {
  trendRange = days;
  // Update button states
  document.querySelectorAll('.range-btn').forEach((btn, i) => {
    const vals = [20, 60, 120, 0];
    btn.classList.toggle('active', vals[i] === days);
  });
  // Redraw trend chart
  if (allCharts['chart-trend']) allCharts['chart-trend'].destroy();
  drawTrendChart();
}

function drawTrendChart() {
  const data = getTrendData();
  const labels = data.map(d => d.date.slice(4));
  const ztVals = data.map(d => d.zt);
  const dtVals = data.map(d => d.dt || 0);

  makeChart('chart-trend', {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: '涨停家数',
          data: ztVals,
          borderColor: '#ff4757',
          backgroundColor: 'rgba(255,71,87,0.08)',
          fill: true,
          tension: 0.4,
          pointRadius: 2,
          pointHoverRadius: 6,
          borderWidth: 2
        },
        {
          label: '跌停家数',
          data: dtVals,
          borderColor: '#2ed573',
          backgroundColor: 'rgba(46,213,115,0.08)',
          fill: true,
          tension: 0.4,
          pointRadius: 2,
          pointHoverRadius: 6,
          borderWidth: 2
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          labels: { color: '#999', usePointStyle: true, padding: 16, font: { size: 13 } }
        },
        tooltip: {
          backgroundColor: '#1a1a2e',
          titleColor: '#ccc',
          bodyColor: '#ccc',
          borderColor: '#2a2a4a',
          borderWidth: 1,
          padding: 10,
          callbacks: {
            title: items => items[0].label ? '20' + items[0].label : '',
            label: ctx => {
              const d = getTrendData()[ctx.dataIndex];
              return `涨停:${d.zt}只  跌停:${d.dt||0}只  最高连板:${d.max_ban}板`;
            }
          }
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          ticks: { color: '#666', stepSize: 1 },
          grid: { color: '#222' },
          title: { display: true, text: '家数', color: '#666' }
        },
        x: {
          ticks: { color: '#666', maxTicksLimit: 12 },
          grid: { color: '#222' }
        }
      }
    }
  });
}

function drawBanDistChart() {
  const td = summary.today || {};
  const dist = td.ban_distribution || {};
  const labels = Object.keys(dist).sort((a,b) => +a - +b);
  const values = labels.map(k => dist[k]);

  makeChart('chart-ban-dist', {
    type: 'bar',
    data: {
      labels: labels.map(k => k + '板'),
      datasets: [{ label: '数量', data: values, backgroundColor: values.map((v,i) => chartColors[i] || '#ff6b35') }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        datalabels: { anchor: 'end', align: 'end', color: '#ccc', font: {size:14} }
      },
      scales: {
        y: { beginAtZero: true, ticks: { color: '#666', stepSize: 1 }, grid: { color: '#222' } },
        x: { ticks: { color: '#999' }, grid: {display: false} }
      }
    },
    plugins: [ChartDataLabels]
  });
}

function drawBanPieChart() {
  const td = summary.today || {};
  const dist = td.ban_distribution || {};
  const labels = Object.keys(dist).sort((a,b) => +a - +b);
  const values = labels.map(k => dist[k]);

  const pieColors = ['#2d3436','#636e72','#b2bec3','#dfe6e9','#ff6b35','#ff4757','#ffc312'];
  makeChart('chart-ban-pie', {
    type: 'doughnut',
    data: {
      labels: labels.map(k => k + '板'),
      datasets: [{ data: values, backgroundColor: pieColors.slice(0, values.length) }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { color: '#999' } },
        datalabels: { color: '#fff', font: {size:12}, formatter: v => v }
      }
    },
    plugins: [ChartDataLabels]
  });
}

function drawConceptTodayChart() {
  const concepts = summary.concept_ranking || [];
  const top20 = concepts.slice(0, 20);

  makeChart('chart-concept-today', {
    type: 'bar',
    data: {
      labels: top20.map(c => c.name),
      datasets: [{ label: '涨停股数', data: top20.map(c => c.count), backgroundColor: '#70a1ff' }]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        datalabels: { anchor: 'end', align: 'end', color: '#ccc', font: {size:11} }
      },
      scales: {
        x: { beginAtZero: true, ticks: { color: '#666', stepSize: 1 }, grid: { color: '#222' } },
        y: { ticks: { color: '#999', font: {size: 10} }, grid: { display: false} }
      }
    },
    plugins: [ChartDataLabels]
  });
}

function drawEchelonBar() {
  const td = summary.today || {};
  const dist = td.ban_distribution || {};
  const labels = Object.keys(dist).sort((a,b) => +a - +b);
  const values = labels.map(k => dist[k]);

  makeChart('chart-echelon-bar', {
    type: 'bar',
    data: {
      labels: labels.map(k => k + '板'),
      datasets: [{ label: '数量', data: values, backgroundColor: values.map((v,i) => chartColors[i] || '#ff6b35') }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        datalabels: { anchor: 'end', align: 'end', color: '#ccc', font: {size:16} }
      },
      scales: {
        y: { beginAtZero: true, ticks: { color: '#666', stepSize: 1 }, grid: { color: '#222' } },
        x: { ticks: { color: '#999' }, grid: { display: false} }
      }
    },
    plugins: [ChartDataLabels]
  });
}

function drawPromoRate() {
  const pr = summary.promotion_rates || {};
  const labels = Object.keys(pr);
  const values = Object.values(pr);

  makeChart('chart-promo-rate', {
    type: 'bar',
    data: {
      labels,
      datasets: [{ label: '晋级率(%)', data: values, backgroundColor: ['#ff6b35','#ffc312','#7bed9f','#70a1ff','#a29bfe'] }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        datalabels: { anchor: 'end', align: 'end', color: '#ccc', font: {size:14}, formatter: v => v + '%' }
      },
      scales: {
        y: { beginAtZero: true, max: 100, ticks: { color: '#666', callback: v => v + '%' }, grid: { color: '#222' } },
        x: { ticks: { color: '#999' }, grid: { display: false} }
      }
    },
    plugins: [ChartDataLabels]
  });
}

function drawConceptRank() {
  const concepts = summary.concept_ranking || [];
  const top20 = concepts.slice(0, 20);

  makeChart('chart-concept-rank', {
    type: 'bar',
    data: {
      labels: top20.map(c => c.name),
      datasets: [{ label: '涨停股数', data: top20.map(c => c.count), backgroundColor: '#70a1ff' }]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        datalabels: { anchor: 'end', align: 'end', color: '#ccc', font: {size:11} }
      },
      scales: {
        x: { beginAtZero: true, ticks: { color: '#666', stepSize: 1 }, grid: { color: '#222' } },
        y: { ticks: { color: '#999', font: {size:10} }, grid: { display: false} }
      }
    },
    plugins: [ChartDataLabels]
  });
}

function drawSectorBar() {
  const mood = summary.sector_mood || [];
  const top15 = mood.slice(0, 15);

  if (top15.length === 0) return;

  const labels = top15.map(m => m.name);
  const ztData = top15.map(m => m.zt);
  const dtData = top15.map(m => m.dt);

  makeChart('chart-sector-bar', {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '涨停', data: ztData, backgroundColor: '#ff4757' },
        { label: '跌停', data: dtData, backgroundColor: '#2ed573' }
      ]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#999', usePointStyle: true } },
        datalabels: {
          anchor: 'end', align: 'end', color: '#ccc', font: {size:10},
          formatter: (v, ctx) => {
            const ds = ctx.datasetIndex;
            const d = top15[ctx.dataIndex];
            return ds === 0 ? (d.zt || '') : '';
          }
        }
      },
      scales: {
        x: { stacked: false, beginAtZero: true, ticks: { color: '#666', stepSize: 1 }, grid: { color: '#222' } },
        y: { stacked: false, ticks: { color: '#999', font: {size:10} }, grid: { display: false} }
      }
    },
    plugins: [ChartDataLabels]
  });
}

// ============================================================
// Interactions
// ============================================================
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

// ============================================================
// Init
// ============================================================
loadAll().catch(console.error);
</script>
</body>
</html>
